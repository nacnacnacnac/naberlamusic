<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naber LA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: cover;
        }
        
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 1;
        }
        
        .main-logo {
            max-width: 400px;
            width: 80vw;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
            transition: transform 0.3s ease;
        }
        
        .main-logo:hover {
            transform: scale(1.05);
        }
        
        .app-logo {
            max-width: 180px;
            width: 40vw;
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        
        .app-logo:hover {
            transform: scale(1.1);
        }
        
        @media (max-width: 768px) {
            .main-logo {
                max-width: 300px;
            }
            
            .app-logo {
                max-width: 140px;
            }
        }
        
        @media (max-width: 480px) {
            .main-logo {
                max-width: 250px;
            }
            
            .app-logo {
                max-width: 120px;
            }
        }
        
        .privacy-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #666666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            z-index: 10;
        }
        
        .privacy-link:hover {
            color: #999999;
        }
        
        @media (max-width: 480px) {
            .privacy-link {
                font-size: 0.8rem;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <video class="video-background" autoplay muted loop>
        <source src="assets/backweb.mp4" type="video/mp4">
    </video>
    <div class="container">
        <img src="assets/nla.png" alt="Naber LA Logo" class="main-logo">
        <img src="assets/appstore.png" alt="App Store" class="app-logo">
    </div>
    <a href="privacy.html" class="privacy-link">Privacy Policy</a>
</body>
</html>
